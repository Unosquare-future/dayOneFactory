<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DayOne Flow Factory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: { DEFAULT: '#F6F1E8', 50: '#FBF8F2', 100: '#F6F1E8', 200: '#EFE7D4', 300: '#E6DCC8' },
        ink: { DEFAULT: '#14213D', 700: '#2A3857', 500: '#5A6684', 300: '#8D97B1' },
        sage: { DEFAULT: '#9BB7A0', 600: '#7A9A82', 200: '#CEDDD0', 50: '#EEF3EE' },
        clay: { DEFAULT: '#C97B63', 600: '#A8604B', 200: '#EBC8BC', 50: '#F8EBE4' },
        taupe: { 100: '#F1E9D9', 300: '#E6DCC8', 500: '#B8AA8C' },
      },
      fontFamily: {
        sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
        serif: ['"Instrument Serif"', 'Georgia', 'serif'],
        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
      },
      boxShadow: {
        soft: '0 1px 2px rgba(20,33,61,0.04), 0 8px 24px -8px rgba(20,33,61,0.08)',
        lift: '0 2px 4px rgba(20,33,61,0.04), 0 16px 40px -12px rgba(20,33,61,0.14)',
        inset: 'inset 0 0 0 1px rgba(20,33,61,0.06)',
      },
      borderRadius: { '4xl': '28px' },
    }
  }
}
</script>
<style>
  html, body { background: #F6F1E8; color: #14213D; font-family: 'DM Sans', system-ui, sans-serif; }
  body { font-feature-settings: "ss01","cv11"; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  /* Outfit placeholder palettes */
  .ph-1 { background: linear-gradient(135deg,#D6C3A8 0%,#A88F6E 100%); }
  .ph-2 { background: linear-gradient(135deg,#B6AE9B 0%,#6E7262 100%); }
  .ph-3 { background: linear-gradient(135deg,#E8C9B3 0%,#B47158 100%); }
  .ph-4 { background: linear-gradient(135deg,#CED8D0 0%,#7A9A82 100%); }
  .ph-5 { background: linear-gradient(135deg,#D9D2C2 0%,#857C63 100%); }
  .ph-6 { background: linear-gradient(135deg,#E3D5C0 0%,#8C735A 100%); }
  .ph-7 { background: linear-gradient(135deg,#C9B9A1 0%,#5C5141 100%); }
  .ph-8 { background: linear-gradient(135deg,#F0D9C6 0%,#C97B63 100%); }
  .ph-9 { background: linear-gradient(135deg,#BFCBBE 0%,#4C6652 100%); }
  .ph-10 { background: linear-gradient(135deg,#E8DCC9 0%,#1E2B47 100%); }
  .ph-11 { background: linear-gradient(135deg,#D4C6B0 0%,#4A5A78 100%); }
  .ph-12 { background: linear-gradient(135deg,#EDDBC7 0%,#8D6E4D 100%); }
  .ph-tex { position: relative; overflow: hidden; }
  .ph-tex::after {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 6px);
    mix-blend-mode: overlay; pointer-events: none;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #E6DCC8; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Reveal bloom */
  @keyframes bloom { 0% { transform: scale(0.6); opacity: 0; } 60% { transform: scale(1.04); opacity: 1; } 100% { transform: scale(1); } }
  .bloom { animation: bloom 700ms cubic-bezier(.2,.8,.2,1) both; }
  @keyframes pulseDot { 0%,100% { opacity: .35 } 50% { opacity: 1 } }
  .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  .shimmer { background: linear-gradient(90deg, #EFE7D4 0%, #F6F1E8 50%, #EFE7D4 100%); background-size: 200% 100%; animation: shimmer 1.8s linear infinite; }

  /* Swipe card stack */
  .card-stack { perspective: 1200px; }

  /* Progress arc gradient */
  .arc-track { stroke: #E6DCC8; }
  .arc-fill { stroke: #7A9A82; }

  /* Inputs */
  input, textarea, select { outline: none; }
  input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 3px rgba(155,183,160,0.35); }

  /* Hide scrollbars in specific places */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Draggable outfit canvas */
  .grid-dots { background-image: radial-gradient(#E6DCC8 1px, transparent 1px); background-size: 16px 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/variants.jsx"></script>
<script type="text/babel" src="src/router.jsx"></script>
<script type="text/babel" src="src/results.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
